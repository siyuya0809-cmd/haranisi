<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プリキュア＆原西 専門知識検定50問</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn { transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .btn:active { transform: translateY(0); }
        .diff-初心者 { background-color: #10b981; color: white; }
        .diff-中級者 { background-color: #3b82f6; color: white; }
        .diff-上級者 { background-color: #f59e0b; color: white; }
        .diff-超難問 { background-color: #ef4444; color: white; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="app" class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden p-6 md:p-10 fade-in relative">
    <!-- Start Screen -->
    <div id="start-screen" class="text-center">
        <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-6">プリキュア＆原西<br>専門知識検定</h1>
        <p class="text-gray-600 mb-8 max-w-2xl mx-auto leading-relaxed">
            本検定は、「わんだふるぷりきゅあ！」「キミとアイドルプリキュア♪」「名探偵プリキュア！」等のアニメ内容、およびFUJIWARA原西孝幸氏の関連エピソードに関する専門知識を問う全50問の厳格なテストです。<br>
            正しいもの、誤っているものの組み合わせを選ぶ形式や、「該当なし」が正解となる問題（超難問）も含まれます。根拠に基づく深い理解が求められます。
        </p>
        <button onclick="startQuiz()" class="btn bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-full text-xl shadow-lg">
            検定を開始する
        </button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <span id="question-counter" class="text-lg font-bold text-indigo-600">Question 1 / 50</span>
            <span id="difficulty-badge" class="px-4 py-1 rounded-full text-sm font-bold shadow-sm">難易度</span>
        </div>
        
        <div class="mb-8">
            <h2 id="question-text" class="text-xl md:text-2xl font-bold text-gray-800 leading-snug"></h2>
        </div>

        <div id="options-container" class="grid grid-cols-1 gap-4 mb-8">
            <!-- Options will be injected here -->
        </div>

        <!-- Result Screen (Hidden initially) -->
        <div id="result-section" class="hidden rounded-xl border-l-4 p-6 mb-6 fade-in">
            <div class="flex items-center mb-4">
                <span id="result-icon" class="text-3xl mr-3"></span>
                <h3 id="result-title" class="text-2xl font-bold"></h3>
            </div>
            <div class="bg-white bg-opacity-50 p-4 rounded-lg">
                <p class="font-bold text-gray-700 mb-2">【正解】 <span id="correct-answer-text" class="text-indigo-700"></span></p>
                <p class="font-bold text-gray-700 mb-1 mt-4">【根拠（ソース）】</p>
                <p id="source-text" class="text-sm text-gray-600 mb-4 bg-gray-100 p-2 rounded border border-gray-200"></p>
                <p class="font-bold text-gray-700 mb-1">【深層解説】</p>
                <p id="explanation-text" class="text-gray-700 leading-relaxed"></p>
            </div>
            <button onclick="nextQuestion()" id="next-btn" class="mt-6 btn bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-lg w-full md:w-auto md:float-right shadow">
                次の問題へ
            </button>
            <div class="clear-both"></div>
        </div>
    </div>

    <!-- Final Score Screen -->
    <div id="score-screen" class="hidden text-center fade-in">
        <h2 class="text-4xl font-extrabold text-gray-800 mb-6">検定終了</h2>
        <p class="text-2xl text-gray-600 mb-8">あなたのスコア: <span id="final-score" class="font-bold text-indigo-600 text-5xl"></span> / 50</p>
        <p id="score-message" class="text-lg text-gray-700 mb-8 leading-relaxed max-w-2xl mx-auto"></p>
        <button onclick="location.reload()" class="btn bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg">
            トップに戻る
        </button>
    </div>
</div>

// Shuffle array utility (optional, but let's keep questions in order as authored for logical flow)

let currentQuestionIndex = 0;
let score = 0;
let answered = false;

const startScreen = document.getElementById('start-screen');
const quizScreen = document.getElementById('quiz-screen');
const scoreScreen = document.getElementById('score-screen');
const questionText = document.getElementById('question-text');
const optionsContainer = document.getElementById('options-container');
const resultSection = document.getElementById('result-section');
const resultIcon = document.getElementById('result-icon');
const resultTitle = document.getElementById('result-title');
const correctAnswerText = document.getElementById('correct-answer-text');
const sourceText = document.getElementById('source-text');
const explanationText = document.getElementById('explanation-text');
const questionCounter = document.getElementById('question-counter');
const difficultyBadge = document.getElementById('difficulty-badge');
const nextBtn = document.getElementById('next-btn');

function startQuiz() {
    startScreen.classList.add('hidden');
    quizScreen.classList.remove('hidden');
    loadQuestion();
}

function loadQuestion() {
    answered = false;
    resultSection.classList.add('hidden');
    optionsContainer.innerHTML = '';
    
    const q = quizData[currentQuestionIndex];
    questionCounter.innerText = `Question ${currentQuestionIndex + 1} / ${quizData.length}`;
    questionText.innerText = q.q;
    
    // Set Difficulty Badge
    difficultyBadge.innerText = q.diff;
    difficultyBadge.className = `px-3 py-1 rounded-full text-xs font-bold shadow-sm diff-${q.diff}`;

    q.opts.forEach((opt, index) => {
        const btn = document.createElement('button');
        // Handle multiline options
        btn.innerHTML = opt.replace(/\n/g, '<br>');
        btn.className = 'btn text-left bg-white border-2 border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 text-gray-800 font-semibold py-4 px-6 rounded-xl w-full';
        btn.onclick = () => selectAnswer(index, btn);
        optionsContainer.appendChild(btn);
    });
}

function selectAnswer(selectedIndex, btnElement) {
    if (answered) return;
    answered = true;
    
    const q = quizData[currentQuestionIndex];
    const isCorrect = selectedIndex === q.ans;
    
    const buttons = optionsContainer.querySelectorAll('button');
    buttons.forEach((btn, idx) => {
        btn.disabled = true;
        btn.classList.remove('hover:border-indigo-500', 'hover:bg-indigo-50');
        if (idx === q.ans) {
            btn.classList.add('bg-green-100', 'border-green-500', 'text-green-800');
        } else if (idx === selectedIndex && !isCorrect) {
            btn.classList.add('bg-red-100', 'border-red-500', 'text-red-800');
        } else {
            btn.classList.add('opacity-50');
        }
    });

    if (isCorrect) {
        score++;
        resultIcon.innerText = '⭕';
        resultIcon.className = 'text-3xl mr-3 text-green-600';
        resultTitle.innerText = '正解！';
        resultTitle.className = 'text-2xl font-bold text-green-600';
        resultSection.classList.remove('border-red-500');
        resultSection.classList.add('border-green-500', 'bg-green-50');
    } else {
        resultIcon.innerText = '❌';
        resultIcon.className = 'text-3xl mr-3 text-red-600';
        resultTitle.innerText = '不正解...';
        resultTitle.className = 'text-2xl font-bold text-red-600';
        resultSection.classList.remove('border-green-500');
        resultSection.classList.add('border-red-500', 'bg-red-50');
    }

    correctAnswerText.innerText = q.opts[q.ans].replace(/\n/g, ' ');
    sourceText.innerText = q.src;
    explanationText.innerText = q.exp;
    
    if (currentQuestionIndex === quizData.length - 1) {
        nextBtn.innerText = '結果を見る';
    } else {
        nextBtn.innerText = '次の問題へ';
    }

    resultSection.classList.remove('hidden');
    // Scroll to bottom
    setTimeout(() => {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }, 100);
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < quizData.length) {
        loadQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        showScore();
    }
}

function showScore() {
    quizScreen.classList.add('hidden');
    scoreScreen.classList.remove('hidden');
    
    document.getElementById('final-score').innerText = score;
    const messageEl = document.getElementById('score-message');
    
    const percentage = (score / quizData.length) * 100;
    if (percentage === 100) {
        messageEl.innerText = "完璧です！あなたは国家試験策定委員も認める、真のプリキュア＆原西マスターです！";
    } else if (percentage >= 80) {
        messageEl.innerText = "素晴らしい知識量です！専門家レベルの深い理解を持っています。";
    } else if (percentage >= 50) {
        messageEl.innerText = "健闘しました！基礎的な知識は備わっていますが、解説を読んでさらに深掘りしましょう。";
    } else {
        messageEl.innerText = "まだまだ学ぶ余地があります。もう一度挑戦して、知識を自分のものにしてください！";
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
